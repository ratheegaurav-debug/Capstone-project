<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SmartStock SME</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-container">
    <div class="auth-card">
        <div class="mb-1">
            <i class="fas fa-boxes-stacked fa-3x" style="color: var(--primary);"></i>
        </div>
        <h1>SmartStock SME</h1>
        <p>Login to manage your inventory</p>

        <form action="dashboard.html" method="GET">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" class="form-input" placeholder="name@company.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" class="form-input" placeholder="••••••••" required>
            </div>
            
            <div class="flex-between mb-1" style="font-size: 0.85rem;">
                <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                    <input type="checkbox"> Remember me
                </label>
                <a href="#" style="color: var(--primary); text-decoration: none;">Forgot Password?</a>
            </div>

            <button type="submit" class="btn btn-primary">Sign In</button>
        </form>

        <p class="mt-1" style="font-size: 0.9rem;">
            Don't have an account? <a href="signup.html" style="color: var(--primary); font-weight: 600; text-decoration: none;">Sign Up</a>
        </p>
    </div>
</body>
</html>
